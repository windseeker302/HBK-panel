services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ${HBK_SERVER_BACKEND_NAME:-hbk-center-api}
    restart: always
    environment:
      HBK_PUBLIC_CENTER_URL: ${HBK_PUBLIC_CENTER_URL:-}
      HBK_REQUIRE_TLS: ${HBK_REQUIRE_TLS:-false}
      HBK_NODE_TOKENS_JSON: ${HBK_NODE_TOKENS_JSON:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health').read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
    container_name: ${HBK_SERVER_FRONTEND_NAME:-hbk-center-web}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HBK_SERVER_PORT:-80}:80"
